<li [class.completed]="todo().isCompleted" [class.editing]="editing">
  <div class="view">
    <input class="toggle" type="checkbox" [checked]="todo().isCompleted" (change)="toggleTodo()" />

    <label (dblclick)="startEdit()">
      {{ todo().title }}
    </label>

    <button class="destroy" aria-label="Delete-todo" (click)="removeTodo()"></button>
  </div>

  @if (editing){
    <input
        #todoInputRef
        class="edit"
        [(ngModel)]="title"
        aria-label="Edit-todo"
        (blur)="commitEdit()"
        (keyup.enter)="commitEdit()"
        (keyup.escape)="cancelEdit()">
  }
</li>
